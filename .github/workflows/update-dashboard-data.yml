name: Update Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-dashboard-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Checkout sensorhub data collector
        uses: actions/checkout@v5
        with:
          repository: Glaecier-Development/glaecier-sensorhub-data-collector
          ref: main
          token: ${{ secrets.SENSORHUB_REPO_PAT }}
          path: sensorhub-data-collector

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build dashboard data
        env:
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
        run: python scripts/build_dashboard_data.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data/dashboard-data.json
          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
            exit 0
          fi
          git commit -m "Update dashboard data"
          git push
