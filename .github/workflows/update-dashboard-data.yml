name: Update Dashboard Data

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours. Firmware changes ~weekly, so frequent polling adds no value;
    # use the "Run workflow" button for an on-demand refresh after a deploy.
    - cron: "0 */6 * * *"

permissions:
  contents: write
  issues: write

jobs:
  update-dashboard-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Checkout sensorhub data collector
        uses: actions/checkout@v5
        with:
          repository: Glaecier-Development/glaecier-sensorhub-data-collector
          ref: main
          token: ${{ secrets.SENSORHUB_REPO_PAT }}
          path: sensorhub-data-collector

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build dashboard data
        env:
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
        run: python scripts/build_dashboard_data.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          # devices.json is included so the registry reconciliation in
          # build_dashboard_data.py (installed version advanced from confirmed
          # device telemetry) persists across runs instead of being re-derived
          # and discarded every cycle.
          git add data/dashboard-data.json data/version-history.json data/devices.json
          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
            exit 0
          fi
          git commit -m "Update dashboard data"
          git push

      - name: Check fleet alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_fleet_alerts.py --execute
