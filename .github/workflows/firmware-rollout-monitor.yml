name: Firmware Rollout Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  firmware-rollout-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Advance active rollout
        env:
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
        run: python scripts/check_rollout.py --execute

      - name: Commit rollout progress
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data/rollout-state.json
          if git diff --cached --quiet; then
            echo "No rollout progress to commit."
            exit 0
          fi
          ACTIVE_VERSION=$(python -c "import json;d=json.load(open('data/rollout-state.json'));a=d.get('active') or (d.get('history') or [{}])[0];print(a.get('version','') if a else '')")
          git commit -m "Rollout: progress ${ACTIVE_VERSION}"
          git push
